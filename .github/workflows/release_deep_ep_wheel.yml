name: Release DeepEP Wheel (wheelnext)

on:
  release:
    types:
      - published

  workflow_dispatch:

  pull_request:
    branches:
      - 'main'
    paths:
      - '.github/workflows/release_deep_ep_wheel.yml'
      - 'build.sh'

jobs:

  build_deep_ep_wheel_910b:
    name: build deep_ep wheel (910b)
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        cann_version: [8.5.0]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/ascend/cann:${{ matrix.cann_version }}-910b-ubuntu22.04-py3.11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Mark repository safe
        run: |
          git config --system --add safe.directory ${GITHUB_WORKSPACE}

      - name: Install dependency
        run: |
          bash scripts/npu_ci_install_dependency.sh --torch-version 2.10.0

      - name: Build DeepEP (910b)
        run: |
          env -i PATH=${PATH} bash --login -c "
            export VERSION=${{ github.event.release.tag_name }} && \
            export LD_LIBRARY_PATH=${ASCEND_HOME_PATH}/runtime/lib64/stub:${LD_LIBRARY_PATH} && \
            ./build.sh -a deepep2
          "

      - name: Repair wheels with auditwheel
        run: |
          python3 -m pip install auditwheel patchelf
          mkdir -p output/repaired
          for whl in output/deep_ep-*.whl; do
            auditwheel repair "$whl" -w output/repaired/ \
              --exclude "libascend*.so" \
              --exclude "libtorch*.so" \
              --exclude libplatform.so \
              --exclude libregister.so \
              --exclude libge_common_base.so \
              --exclude libc10.so \
              --exclude libc_sec.so \
              --exclude libnnopbase.so \
              --exclude libprofapi.so \
              --exclude libgraph_base.so \
              --exclude libgraph.so \
              --exclude libexe_graph.so \
              --exclude libopapi.so \
              --exclude liberror_manager.so \
              --exclude libruntime.so \
              --exclude libmmpa.so
          done
          rm -f output/*.whl
          mv output/repaired/*.whl output/
          rmdir output/repaired
          ls output/

      - name: Generate variant wheels
        env:
          WHEEL_FILE: output
          PROJECT_TOML: .github/workflows/scripts/wheel/pyproject.toml
          OUTPUT_DIR: output/variants
        run: |
          pip install build git+https://github.com/wheelnext/variantlib.git --quiet
          mkdir -p output/variants
          python3 .github/workflows/scripts/wheel/make_variant.py \
            -c .github/workflows/scripts/wheel/config.json \
            -l a2
          echo "Generated variant wheels:"
          ls output/variants/

      - name: Archive wheel
        uses: actions/upload-artifact@v4
        with:
          name: deep-ep-910b-${{ matrix.arch }}-cann${{ matrix.cann_version }}-py3.11-wheel
          path: output/


  build_deep_ep_wheel_a3:
    name: build deep_ep wheel (a3)
    strategy:
      matrix:
        arch: [x86_64, aarch64]
        cann_version: [8.5.0]
        include:
          - arch: x86_64
            runner: ubuntu-24.04
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    container:
      image: quay.io/ascend/cann:${{ matrix.cann_version }}-a3-ubuntu22.04-py3.11

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Mark repository safe
        run: |
          git config --system --add safe.directory ${GITHUB_WORKSPACE}

      - name: Install dependency
        run: |
          bash scripts/npu_ci_install_dependency.sh --torch-version 2.10.0

      - name: Build DeepEP (a3)
        run: |
          env -i PATH=${PATH} bash --login -c "
            export VERSION=${{ github.event.release.tag_name }} && \
            export LD_LIBRARY_PATH=${ASCEND_HOME_PATH}/runtime/lib64/stub:${LD_LIBRARY_PATH} && \
            ./build.sh -a deepep
          "

      - name: Repair wheels with auditwheel
        run: |
          python3 -m pip install auditwheel patchelf
          mkdir -p output/repaired
          for whl in output/deep_ep-*.whl; do
            auditwheel repair "$whl" -w output/repaired/ \
              --exclude "libascend*.so" \
              --exclude "libtorch*.so" \
              --exclude libplatform.so \
              --exclude libregister.so \
              --exclude libge_common_base.so \
              --exclude libc10.so \
              --exclude libc_sec.so \
              --exclude libnnopbase.so \
              --exclude libprofapi.so \
              --exclude libgraph_base.so \
              --exclude libgraph.so \
              --exclude libexe_graph.so \
              --exclude libopapi.so \
              --exclude liberror_manager.so \
              --exclude libruntime.so \
              --exclude libmmpa.so
          done
          rm -f output/*.whl
          mv output/repaired/*.whl output/
          rmdir output/repaired
          ls output/

      - name: Generate variant wheels
        env:
          WHEEL_FILE: output
          PROJECT_TOML: .github/workflows/scripts/wheel/pyproject.toml
          OUTPUT_DIR: output/variants
        run: |
          pip install build git+https://github.com/wheelnext/variantlib.git --quiet
          mkdir -p output/variants
          python3 .github/workflows/scripts/wheel/make_variant.py \
            -c .github/workflows/scripts/wheel/config.json \
            -l a3
          echo "Generated variant wheels:"
          ls output/variants/

      - name: Archive wheel
        uses: actions/upload-artifact@v4
        with:
          name: deep-ep-a3-${{ matrix.arch }}-cann${{ matrix.cann_version }}-py3.11-wheel
          path: output/


  generate_and_upload_variant_index:
    name: generate and upload variant index
    needs: [build_deep_ep_wheel_910b, build_deep_ep_wheel_a3]
    if: ${{ github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Download all variant wheels
        uses: actions/download-artifact@v4
        with:
          pattern: 'deep-ep-*-wheel'
          path: all-wheels/
          merge-multiple: true

      - name: Collect variant wheels
        run: |
          mkdir -p combined-variants
          find all-wheels/ -path '*/variants/*.whl' -exec cp {} combined-variants/ \;
          echo "Combined variant wheels:"
          ls combined-variants/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate combined variant index
        run: |
          pip install git+https://github.com/wheelnext/variantlib.git --quiet
          variantlib generate-index-json -d combined-variants/
          echo "Generated index files:"
          ls combined-variants/

      - name: Upload wheels and variant index to OBS
        env:
          OBS_ACCESS_KEY: ${{ secrets.OBS_ACCESS_KEY_ID }}
          OBS_SECRET_KEY: ${{ secrets.OBS_SECRET_ACCESS_KEY }}
        run: |
          pip install esdk-obs-python --quiet
          python3 - <<'EOF'
          import os, glob
          from obs import ObsClient
          OBS_BUCKET = 'ascend-artifcat-packages'
          OBS_PATH = 'pypi/packages/ascend/repos/pypi/variant/deep-ep'
          client = ObsClient(
              access_key_id=os.environ['OBS_ACCESS_KEY'],
              secret_access_key=os.environ['OBS_SECRET_KEY'],
              server='https://obs.cn-north-4.myhuaweicloud.com'
          )
          files = glob.glob('combined-variants/*.whl') + glob.glob('combined-variants/*.json')
          for file in files:
              filename = os.path.basename(file)
              resp = client.putFile(OBS_BUCKET, f'{OBS_PATH}/{filename}', file)
              if resp.status < 300:
                  print(f'Uploaded: {filename}')
              else:
                  raise Exception(f'Failed to upload {filename}: {resp.errorMessage}')
          EOF
